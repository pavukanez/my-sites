<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experiment Site</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #111827, #374151);
        color: #f9fafb;
      }
      main {
        text-align: center;
        max-width: 680px;
        padding: 2rem;
      }
      code {
        background: #1f2937;
        padding: 0.2rem 0.4rem;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Experiment Demo</h1>
      <p>This is the <strong>experiment</strong> site.</p>
      <p>Set <code>active_site: experiment</code> in <code>active-site.yaml</code> to deploy this one.</p>
    </main>
  </body>
</html>
